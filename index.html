<script>

/* ========= SAFE ELEMENT LOADING ========= */

window.addEventListener("DOMContentLoaded", function(){

const music = document.getElementById("music")
const volumeSlider = document.getElementById("vol")
const stars = document.querySelector(".stars")
const title = document.querySelector(".hero h1")
const bgName = document.getElementById("bgName")
const settingsPanel = document.getElementById("settings")

/* ========= SETTINGS PANEL ========= */

window.openSettings = function(){
settingsPanel.style.display = "block"
}

window.closeSettings = function(){
settingsPanel.style.display = "none"
}

/* ========= MUSIC SYSTEM ========= */

document.addEventListener("click", function(){
music.volume = volumeSlider.value / 100
music.play()
},{once:true})

volumeSlider.addEventListener("input", function(){
music.volume = this.value / 100
})

/* ========= BACKGROUND DATA ========= */

const backgrounds = [
"stellar",
"nebula",
"singularity",
"abyss",
"grid"
]

const backgroundNames = {
stellar:"Stellar",
nebula:"Nebula Storm",
singularity:"Singularity",
abyss:"Abyssal Depths",
grid:"Cyber Grid"
}

const titleThemes = {
stellar:"linear-gradient(90deg,#60a5fa,#38bdf8,#2563eb)",
nebula:"linear-gradient(90deg,#ec4899,#9333ea,#6366f1)",
singularity:"linear-gradient(90deg,#a855f7,#7e22ce,#000000)",
abyss:"linear-gradient(90deg,#0ea5e9,#1e40af,#020617)",
grid:"linear-gradient(90deg,#22d3ee,#06b6d4,#0891b2)"
}

let currentBG = 0

/* ========= APPLY BACKGROUND ========= */

function applyBackground(){

let bg = backgrounds[currentBG]

document.body.classList.remove(
"nebula",
"singularity",
"abyss",
"grid"
)

if(bg === "stellar"){
stars.style.display = "block"
}else{
stars.style.display = "none"
document.body.classList.add(bg)
}

bgName.innerText = backgroundNames[bg]

title.style.background = titleThemes[bg]
title.style.webkitBackgroundClip = "text"
title.style.color = "transparent"

localStorage.setItem("abyss_background", currentBG)

}

/* ========= SWITCH BACKGROUND ========= */

window.nextBG = function(){

currentBG++

if(currentBG >= backgrounds.length){
currentBG = 0
}

applyBackground()

}

window.prevBG = function(){

currentBG--

if(currentBG < 0){
currentBG = backgrounds.length - 1
}

applyBackground()

}

/* ========= LOAD SAVED SETTINGS ========= */

let savedBG = localStorage.getItem("abyss_background")

if(savedBG !== null){
currentBG = parseInt(savedBG)
}

applyBackground()

})

</script>
