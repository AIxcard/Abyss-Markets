```html
<!DOCTYPE html>
<html>

<head>

<title>Aetherfall Market</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e1b4b,
#3b0764
);

background-size:400% 400%;
animation:skyShift 18s ease infinite;
}

@keyframes skyShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#38bdf8 1px, transparent 1px),
radial-gradient(#9333ea 1px, transparent 1px);

background-size:120px 120px,200px 200px,260px 260px;

opacity:0.35;

animation:starMove 90s linear infinite;
}

@keyframes starMove{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
font-size:90px;
letter-spacing:6px;

background:linear-gradient(
90deg,
#38bdf8,
#6366f1,
#9333ea
);

-webkit-background-clip:text;
color:transparent;
}

.enterBtn{
margin-top:50px;
padding:16px 60px;
font-size:18px;
border-radius:12px;
background:#0f172a;
border:1px solid #38bdf8;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="center">

<h1 class="logo">AETHERFALL</h1>

<a href="market.html" class="enterBtn">ENTER</a>

</div>

<script src="cursor.js"></script>

</body>

</html>
```
