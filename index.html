```html
<!DOCTYPE html>
<html>

<head>

<title>Aetherfall Market</title>

<style>

/* PAGE */

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e1b4b,
#3b0764
);

background-size:400% 400%;
animation:skyShift 18s ease infinite;
}

/* BACKGROUND GRADIENT */

@keyframes skyShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#38bdf8 1px, transparent 1px),
radial-gradient(#9333ea 1px, transparent 1px);

background-size:120px 120px,200px 200px,260px 260px;

opacity:0.35;
}

/* CENTER */

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* LOGO */

.logo{

font-size:90px;
letter-spacing:6px;

background:linear-gradient(
90deg,
#38bdf8,
#6366f1,
#9333ea,
#38bdf8
);

background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:logoGradient 8s linear infinite;

text-shadow:
0 0 20px rgba(56,189,248,0.5),
0 0 40px rgba(99,102,241,0.4);

}

/* LOGO GRADIENT ANIMATION */

@keyframes logoGradient{
0%{background-position:0%;}
100%{background-position:300%;}
}

/* SUBTITLE */

.subtitle{
margin-top:10px;
opacity:0.8;
font-size:20px;
letter-spacing:2px;
}

/* ENTER BUTTON */

.enterBtn{

margin-top:50px;

padding:16px 50px;

font-size:18px;

border-radius:12px;

background:#0f172a;

border:1px solid #38bdf8;

color:white;

text-decoration:none;

transition:0.35s;

box-shadow:0 0 10px rgba(56,189,248,0.3);

}

.enterBtn:hover{

transform:scale(1.15);

box-shadow:
0 0 20px #38bdf8,
0 0 40px #6366f1;

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="center">

<h1 class="logo">
AETHERFALL
</h1>

<div class="subtitle">
MARKETPLACE
</div>

<a href="market.html" class="enterBtn">
ENTER
</a>

</div>

</body>

</html>
```
