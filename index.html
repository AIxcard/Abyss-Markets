```html
<!DOCTYPE html>
<html>

<head>
<title>Aetherfall Market</title>

<style>

/* REMOVE DEFAULT CURSOR */

*{
cursor:none !important;
}

/* BODY */

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e1b4b,
#3b0764
);

background-size:400% 400%;
animation:skyShift 20s ease infinite;
}

@keyframes skyShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#38bdf8 1px, transparent 1px),
radial-gradient(#9333ea 1px, transparent 1px);

background-size:120px 120px, 200px 200px, 260px 260px;

opacity:0.35;

animation:starMove 100s linear infinite;
}

@keyframes starMove{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* CENTER */

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
position:relative;
}

/* LOGO */

.logo{

font-size:95px;
letter-spacing:6px;

background:linear-gradient(
90deg,
#38bdf8,
#6366f1,
#9333ea,
#38bdf8
);

background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:logoGradient 8s linear infinite;

text-shadow:
0 0 25px rgba(56,189,248,0.5),
0 0 50px rgba(147,51,234,0.4);

}

@keyframes logoGradient{
0%{background-position:0%;}
100%{background-position:300%;}
}

/* SUBTITLE */

.subtitle{
margin-top:10px;
opacity:0.85;
font-size:20px;
letter-spacing:3px;
}

/* ENTER BUTTON */

.enterBtn{

margin-top:50px;
padding:16px 60px;

font-size:18px;

border-radius:12px;

background:#0f172a;

border:1px solid #38bdf8;

color:white;

text-decoration:none;

transition:0.35s;

box-shadow:0 0 15px rgba(56,189,248,0.35);

}

.enterBtn:hover{

transform:scale(1.15);

box-shadow:
0 0 25px #38bdf8,
0 0 50px #6366f1;

}

/* CUSTOM ANIME STYLE CURSOR */

.cursor{

position:fixed;
width:42px;
height:42px;

pointer-events:none;

transform:translate(-50%,-50%);

z-index:9999;

}

/* center dot */

.cursor::before{

content:"";
position:absolute;

left:50%;
top:50%;

width:6px;
height:6px;

transform:translate(-50%,-50%);

border-radius:50%;

background:linear-gradient(
45deg,
#38bdf8,
#6366f1,
#9333ea
);

box-shadow:
0 0 8px #38bdf8,
0 0 14px #9333ea;

}

/* outer ring */

.cursor::after{

content:"";
position:absolute;

left:50%;
top:50%;

width:34px;
height:34px;

transform:translate(-50%,-50%);

border-radius:50%;

border:2px solid transparent;

background:linear-gradient(#020617,#020617) padding-box,
linear-gradient(45deg,#38bdf8,#6366f1,#9333ea) border-box;

box-shadow:
0 0 10px #38bdf8,
0 0 20px #9333ea;

}

/* rotate animation */

.cursor{
animation:cursorSpin 4s linear infinite;
}

@keyframes cursorSpin{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="center">

<h1 class="logo">
AETHERFALL
</h1>

<div class="subtitle">
MARKETPLACE
</div>

<a href="market.html" class="enterBtn">
ENTER
</a>

</div>

<div class="cursor" id="cursor"></div>

<script>

/* CURSOR FOLLOW */

const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {

cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";

});

</script>

</body>
</html>
```
