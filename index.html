```html
<!DOCTYPE html>
<html>

<head>
<title>Aetherfall Market</title>

<style>

/* hide normal cursor everywhere */

*{
cursor:none;
}

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e1b4b,
#3b0764
);

background-size:400% 400%;
animation:skyShift 20s ease infinite;
}

@keyframes skyShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* center content */

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
font-size:90px;
letter-spacing:6px;

background:linear-gradient(90deg,#38bdf8,#6366f1,#9333ea);
-webkit-background-clip:text;
color:transparent;
}

.enterBtn{
margin-top:40px;
padding:16px 60px;
border-radius:12px;
border:1px solid #38bdf8;
background:#0f172a;
color:white;
text-decoration:none;
font-size:18px;
}

/* CUSTOM CURSOR */

.cursor{
position:fixed;
width:36px;
height:36px;
pointer-events:none;
z-index:9999;
transform:translate(-50%,-50%);
}

/* flame effect */

.flame{
position:absolute;
top:-10px;
left:50%;
width:8px;
height:14px;
transform:translateX(-50%);
background:linear-gradient(#38bdf8,#9333ea,transparent);
opacity:0;
filter:blur(1px);
}

@keyframes flameBurst{

0%{opacity:1; transform:translateX(-50%) scaleY(0.6);}
50%{opacity:1; transform:translateX(-50%) scaleY(1.4);}
100%{opacity:0; transform:translateX(-50%) scaleY(0.3);}

}

</style>

</head>

<body>

<div class="center">

<h1 class="logo">AETHERFALL</h1>

<a href="market.html" class="enterBtn">ENTER</a>

</div>

<!-- ESCANOR STYLE CURSOR -->

<div class="cursor" id="cursor">

<svg width="36" height="36" viewBox="0 0 100 100">

<!-- blade shape -->

<polygon
points="50,5 80,45 60,95 40,95 20,45"
fill="url(#grad)"
stroke="#1e293b"
stroke-width="3"
/>

<defs>
<linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#38bdf8"/>
<stop offset="50%" stop-color="#6366f1"/>
<stop offset="100%" stop-color="#9333ea"/>
</linearGradient>
</defs>

</svg>

<div class="flame" id="flame"></div>

</div>

<script>

/* cursor follow */

const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {

cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";

});

/* flame flicker */

const flame = document.getElementById("flame");

function flameBurst(){

flame.style.animation="none";
flame.offsetHeight;

flame.style.animation="flameBurst 0.4s ease";

}

function randomFlame(){

flameBurst();

let next = 5000 + Math.random()*5000;

setTimeout(randomFlame,next);

}

randomFlame();

</script>

</body>
</html>
```
