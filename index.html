```html
<!DOCTYPE html>
<html>

<head>

<title>Aetherfall Market</title>

<style>

/* remove system cursor */

*{
cursor:none !important;
}

/* body */

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e1b4b,
#3b0764
);

background-size:400% 400%;
animation:skyMove 20s ease infinite;
}

/* background animation */

@keyframes skyMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* stars */

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#38bdf8 1px, transparent 1px),
radial-gradient(#9333ea 1px, transparent 1px);

background-size:120px 120px,200px 200px,260px 260px;

opacity:0.35;

animation:starMove 100s linear infinite;
}

@keyframes starMove{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* center */

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* logo */

.logo{

font-size:100px;
letter-spacing:6px;

background:linear-gradient(
90deg,
#38bdf8,
#6366f1,
#9333ea,
#38bdf8
);

background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:logoFlow 8s linear infinite;

text-shadow:
0 0 25px rgba(56,189,248,0.6),
0 0 40px rgba(147,51,234,0.4);

}

@keyframes logoFlow{
0%{background-position:0%}
100%{background-position:300%}
}

/* subtitle */

.subtitle{
margin-top:12px;
font-size:20px;
letter-spacing:3px;
opacity:0.8;
}

/* enter button */

.enterBtn{

margin-top:50px;

padding:16px 60px;

font-size:18px;

border-radius:12px;

background:#0f172a;

border:1px solid #38bdf8;

color:white;

text-decoration:none;

transition:0.35s;

box-shadow:0 0 10px rgba(56,189,248,0.3);

}

.enterBtn:hover{

transform:scale(1.15);

box-shadow:
0 0 20px #38bdf8,
0 0 40px #6366f1;

}

/* custom cursor */

.cursor{

position:fixed;
width:28px;
height:28px;

pointer-events:none;
z-index:9999;

background-image:url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'>\
<defs>\
<linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'>\
<stop offset='0%' stop-color='%2338bdf8'/>\
<stop offset='50%' stop-color='%236366f1'/>\
<stop offset='100%' stop-color='%239333ea'/>\
</linearGradient>\
</defs>\
<path fill='url(%23g)' d='M3 2 L3 24 L9 18 L13 30 L17 28 L13 16 L22 16 Z'/>\
</svg>");

background-size:contain;
background-repeat:no-repeat;

filter:
drop-shadow(0 0 4px #38bdf8)
drop-shadow(0 0 6px #9333ea);

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="center">

<h1 class="logo">
AETHERFALL
</h1>

<div class="subtitle">
MARKETPLACE
</div>

<a href="market.html" class="enterBtn">
ENTER
</a>

</div>

<div class="cursor" id="cursor"></div>

<script>

/* cursor follow */

const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {

cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";

});

</script>

</body>

</html>
```
