```html
<!DOCTYPE html>
<html>

<head>
<title>Aetherfall Market</title>

<style>

/* BASE */

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
cursor:none;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e1b4b,
#3b0764
);

background-size:400% 400%;
animation:skyShift 20s ease infinite;
}

@keyframes skyShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#38bdf8 1px, transparent 1px),
radial-gradient(#9333ea 1px, transparent 1px);

background-size:120px 120px, 200px 200px, 260px 260px;

opacity:0.35;

animation:starMove 100s linear infinite;
z-index:0;
}

@keyframes starMove{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* CENTER */

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
position:relative;
animation:fadeIn 2s ease;
}

/* LOGO */

.logo{
font-size:95px;
letter-spacing:6px;

background:linear-gradient(
90deg,
#38bdf8,
#6366f1,
#9333ea,
#38bdf8
);

background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:logoGradient 8s linear infinite;

text-shadow:
0 0 25px rgba(56,189,248,0.5),
0 0 50px rgba(147,51,234,0.4);
}

@keyframes logoGradient{
0%{background-position:0%;}
100%{background-position:300%;}
}

/* SUBTITLE */

.subtitle{
margin-top:10px;
opacity:0.85;
font-size:20px;
letter-spacing:3px;
}

/* ENTER BUTTON */

.enterBtn{

margin-top:50px;
padding:16px 60px;

font-size:18px;

border-radius:12px;

background:#0f172a;

border:1px solid #38bdf8;

color:white;

text-decoration:none;

transition:0.35s;

box-shadow:0 0 15px rgba(56,189,248,0.35);

position:relative;
z-index:3;

}

.enterBtn:hover{

transform:scale(1.15);

box-shadow:
0 0 25px #38bdf8,
0 0 50px #6366f1;

}

/* CROSSHAIR */

.crosshair{

position:fixed;

width:28px;
height:28px;

pointer-events:none;

transform:translate(-50%,-50%);

z-index:9999;

}

.crosshair::before,
.crosshair::after{

content:"";
position:absolute;

background:linear-gradient(
90deg,
#38bdf8,
#9333ea
);

box-shadow:
0 0 10px #38bdf8,
0 0 15px #9333ea;

}

.crosshair::before{
width:2px;
height:28px;
left:50%;
transform:translateX(-50%);
}

.crosshair::after{
height:2px;
width:28px;
top:50%;
transform:translateY(-50%);
}

/* FADE */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="center">

<h1 class="logo">
AETHERFALL
</h1>

<div class="subtitle">
MARKETPLACE
</div>

<a href="market.html" class="enterBtn">
ENTER
</a>

</div>

<div class="crosshair" id="crosshair"></div>

<script>

/* CROSSHAIR FOLLOW */

const crosshair = document.getElementById("crosshair");

document.addEventListener("mousemove", e => {

crosshair.style.left = e.clientX + "px";
crosshair.style.top = e.clientY + "px";

});

</script>

</body>
</html>
```
