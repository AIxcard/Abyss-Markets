<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aetherfall Market</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:linear-gradient(-45deg,#6d28d9,#9333ea,#ffffff,#7c3aed);
background-size:400% 400%;
animation:bgMove 12s ease infinite;

font-family:Poppins,sans-serif;

transition:opacity .6s;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.logo{

font-size:95px;
letter-spacing:8px;

background:linear-gradient(90deg,#ffffff,#c084fc,#7c3aed,#ffffff);
background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:titleMove 7s linear infinite;

text-shadow:0 0 25px rgba(255,255,255,.6),0 0 40px rgba(147,51,234,.7);

}

@keyframes titleMove{
0%{background-position:0%}
100%{background-position:300%}
}

.tagline{

margin-top:25px;
font-size:24px;
color:black;
max-width:650px;

}

.enterBtn{

margin-top:55px;

padding:18px 70px;

font-size:18px;

border-radius:14px;

background:black;
color:white;

border:none;

cursor:pointer;

transition:.35s;

}

.enterBtn:hover{

transform:scale(1.15);

box-shadow:0 0 25px #9333ea,0 0 45px #ffffff;

}

</style>
</head>

<body>

<h1 class="logo">AETHERFALL MARKET</h1>

<div class="tagline">
Premium snacks and gaming services for players who want the best.
</div>

<button class="enterBtn" onclick="enterSite()">ENTER</button>

<script>

function enterSite(){

document.body.style.opacity="0"

setTimeout(function(){

window.location.href="market.html"

},600)

}

</script>

<script src="cursor.js"></script>

</body>
</html>
