<!DOCTYPE html>
<html>
<head>
<title>Aetherfall Market</title>
<style>
    * {
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
        background:#020617;
        color:white;
        overflow-x:hidden;
    }

    /* GALAXY STARS */
    .stars {
        position:fixed;
        width:100%;
        height:200%;
        top:-100%;
        left:0;
        background:
            radial-gradient(white 1px, transparent 1px),
            radial-gradient(#60a5fa 1px, transparent 1px),
            radial-gradient(#3b82f6 2px, transparent 2px);
        background-size:120px 120px,200px 200px,300px 300px;
        animation:starsMove 120s linear infinite;
        z-index:-2;
    }

    @keyframes starsMove {
        from{transform:translateY(0)}
        to{transform:translateY(2000px)}
    }

    /* BACKGROUND THEMES */
    .nebula { background: radial-gradient(circle at 20% 30%,#9333ea 0%,transparent 50%), radial-gradient(circle at 80% 70%,#2563eb 0%,transparent 50%), radial-gradient(circle at 50% 50%,#ec4899 0%,transparent 60%), #020617; }
    .singularity { background: radial-gradient(circle at center,#7e22ce 0%,#000000 70%), radial-gradient(circle at center,rgba(168,85,247,.5) 0%,transparent 40%); }
    .abyss { background:#000000; }
    .grid { background: linear-gradient(#0f172a 1px,transparent 1px), linear-gradient(90deg,#0f172a 1px,transparent 1px); background-size:50px 50px; background-color:#020617; }

    /* HERO */
    .hero {
        width:100%;
        height:220px;
        display:flex;
        align-items:center;
        justify-content:center;
        background:linear-gradient(270deg,#000000,#4c1d95,#000000,#7e22ce,#000000);
        background-size:600% 600%;
        animation:gradientFlow 15s ease infinite;
        box-shadow: 0 0 40px rgba(168,85,247,.5);
    }

    @keyframes gradientFlow {
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }

    .hero h1 {
        font-size: clamp(32px, 8vw, 64px);
        font-weight:bold;
        letter-spacing:6px;
        color:#c084fc;
        text-shadow: 0 0 20px #9333ea;
        text-align: center;
    }

    /* --- UPGRADED NAV BAR --- */
    nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr; /* This keeps the middle centered regardless of the sides */
        align-items: center;
        padding: 0 40px;
        height: 70px;
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    /* TOP LEFT USER SECTION */
    .user-profile {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #38bdf8;
    }
    
    .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #1e40af;
        border: 1px solid #38bdf8;
    }

    /* CENTERED LINKS */
    .nav-links {
        display: flex;
        gap: 25px;
    }

    .nav-links a {
        color: #94a3b8;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        transition: 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .nav-links a:hover {
        color: #38bdf8;
        text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }

    /* RIGHT SIDE AUTH */
    .auth-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    .btn-auth {
        padding: 8px 18px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 14px;
        font-weight: bold;
        transition: 0.3s;
    }

    .login-link {
        color: #38bdf8;
        border: 1px solid rgba(56, 189, 248, 0.3);
    }

    .signup-link {
        background: #2563eb;
        color: white;
    }

    .signup-link:hover {
        background: #1d4ed8;
        transform: translateY(-1px);
    }

    /* CONTENT SECTIONS */
    section { max-width:950px; margin:auto; padding:60px 20px; }
    h2 { margin-bottom:25px; color:#60a5fa; border-bottom:2px solid #1e40af; padding-bottom:10px; }

    .card {
        background:rgba(15,23,42,.85);
        border:1px solid #1e3a8a;
        border-radius:12px;
        padding:15px;
        margin:12px 0;
        transition:.25s;
    }

    .card:hover {
        transform:translateX(5px);
        border-color:#38bdf8;
        background:rgba(30, 58, 138, 0.3);
    }

    /* FOOTER & SETTINGS */
    footer { text-align:center; padding:40px; background:rgba(2,6,23,.8); }
    .settingsBtn { position:fixed; bottom:20px; right:20px; font-size:28px; background:#020617; border:1px solid #2563eb; border-radius:12px; padding:12px 18px; cursor:pointer; z-index:999; }
</style>
</head>

        <a href="#terms">Terms</a>

    </div>

    <div class="auth-buttons">
        <a href="login.html" class="btn-auth login-link">Log In</a>
        <a href="signup.html" class="btn-auth signup-link">Sign Up</a>
    </div>
</nav>

<div class="hero">
    <h1>AETHERFALL MARKET</h1>
</div>

<section id="snacks">

</script>

</body>
</html>
