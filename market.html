<!DOCTYPE html>

<html>

<head>

<title>Aetherfall Market</title>

<link rel="stylesheet" href="style.css">

<style>

.grid{

max-width:1200px;

margin:auto;

padding-top:120px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:40px;

}

.card{

background:#0f172a;

padding:40px;

border-radius:16px;

border:1px solid #1e3a8a;

text-align:center;

cursor:pointer;

transition:0.3s;

}

.card:hover{

transform:scale(1.1);

box-shadow:0 0 30px #2563eb;

border-color:#38bdf8;

}

.title{

text-align:center;

font-size:50px;

margin-top:40px;

background:linear-gradient(90deg,#38bdf8,#9333ea);

-webkit-background-clip:text;

color:transparent;

}

</style>

</head>

<body>

<div class="stars"></div>

<h1 class="title">
AETHERFALL MARKET
</h1>

<div class="grid">

<a href="services.html" class="card">
Roblox Services
</a>

<a href="services.html#snacks" class="card">
Snacks
</a>

<a href="reviews.html" class="card">
Customer Reviews
</a>

<a href="services.html#faq" class="card">
FAQ & Terms
</a>

</div>

</body>

</html>
