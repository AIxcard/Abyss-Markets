<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherfall Market | Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(13, 17, 23, 0.9);
            --border: #30363d;
            --accent: #238636; /* Market Green */
            --text: #ffffff;
            --link: #58a6ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Subtler tech grid */
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .auth-card {
            background: var(--panel);
            width: 100%;
            max-width: 380px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            text-align: center;
        }

        h2 {
            font-family: 'Orbitron';
            font-size: 24px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            font-family: 'Rajdhani';
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--link);
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Rajdhani';
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-main:hover {
            opacity: 0.9;
        }

        .toggle-area {
            margin-top: 20px;
            font-size: 14px;
            color: #8b949e;
        }

        .btn-toggle {
            background: none;
            border: none;
            color: var(--link);
            font-family: 'Rajdhani';
            font-weight: 700;
            cursor: pointer;
        }

        .status-box {
            font-size: 13px;
            margin-bottom: 10px;
            min-height: 18px;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #8b949e;
            text-decoration: none;
            font-size: 13px;
        }

        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="title">Create Account</h2>
        <p class="subtitle" id="subtitle">Join Aetherfall Market to start shopping.</p>
        
        <div id="status-msg" class="status-box"></div>
        
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Choose Username" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Create Password">
        </div>
        
        <button class="btn-main" id="mainBtn">Create Account</button>
        
        <div class="toggle-area">
            <span id="toggleText">Already have an account?</span> 
            <button class="btn-toggle" id="toggleMode">Sign In</button>
        </div>
        
        <a href="market.html" class="back-link">← Return to Aetherfall Market</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVvsUZJlFEMsdjH7FSXxmxCMZgU_zLzBg",
            authDomain: "quickaetherfall.firebaseapp.com",
            projectId: "quickaetherfall",
            storageBucket: "quickaetherfall.firebasestorage.app",
            messagingSenderId: "1061970586865",
            appId: "1:1061970586865:web:ad87fa9b304b0909d04d50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLoginMode = false;

        const msg = document.getElementById('status-msg');
        const mainBtn = document.getElementById('mainBtn');
        const toggleBtn = document.getElementById('toggleMode');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const toggleText = document.getElementById('toggleText');

        const notify = (text, color) => { msg.innerText = text; msg.style.color = color; };
        const toEmail = (name) => `${name.trim().toLowerCase()}@market.com`;

        function updateUI() {
            if (isLoginMode) {
                title.innerText = "Sign In";
                subtitle.innerText = "Welcome back to Aetherfall Market.";
                mainBtn.innerText = "Sign In";
                toggleText.innerText = "Need an account?";
                toggleBtn.innerText = "Create one";
                document.getElementById('userInput').placeholder = "Username";
                document.getElementById('passInput').placeholder = "Password";
            } else {
                title.innerText = "Create Account";
                subtitle.innerText = "Join Aetherfall Market to start shopping.";
                mainBtn.innerText = "Create Account";
                toggleText.innerText = "Already have an account?";
                toggleBtn.innerText = "Sign In";
                document.getElementById('userInput').placeholder = "Choose Username";
                document.getElementById('passInput').placeholder = "Create Password";
            }
            notify("", "");
        }

        // Logic to check URL Hash
        function checkMode() {
            if (window.location.hash === "#login") {
                isLoginMode = true;
            } else {
                isLoginMode = false;
            }
            updateUI();
        }

        window.addEventListener('load', checkMode);
        window.addEventListener('hashchange', checkMode);

        toggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            window.location.hash = isLoginMode ? "login" : "signup";
            updateUI();
        });

        mainBtn.addEventListener('click', () => {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            if (!user || !pass) return notify("Please fill in all fields.", "#ff7b72");

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, toEmail(user), pass)
                    .then(() => {
                        localStorage.setItem("market_user", user);
                        window.location.href = "market.html";
                    })
                    .catch(() => notify("Invalid username or password.", "#ff7b72"));
            } else {
                if (pass.length < 6) return notify("Password must be 6+ characters.", "#ff7b72");
                
                createUserWithEmailAndPassword(auth, toEmail(user), pass)
                    .then(() => {
                        localStorage.setItem("market_user", user);
                        notify("Account created! Entering market...", "#238636");
                        setTimeout(() => { window.location.href = "market.html"; }, 1500);
                    })
                    .catch((err) => notify("Error: " + err.message, "#ff7b72"));
            }
        });
    </script>
</body>
</html>
