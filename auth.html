<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherfall Market | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(13, 17, 23, 0.95);
            --border: #30363d;
            --accent: #238636; /* The Green from your screenshot */
            --text: #ffffff;
            --link: #58a6ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
        }

        /* --- AMAZING LOADING UI --- */
        #loader-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 10, 0.98);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-circle {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(35, 134, 54, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            filter: drop-shadow(0 0 15px var(--accent));
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }

        #loader-text {
            margin-top: 25px;
            font-family: 'Orbitron';
            color: var(--accent);
            letter-spacing: 4px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* --- AUTH CARD --- */
        .auth-card {
            background: var(--panel);
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }

        h2 { font-family: 'Orbitron'; font-size: 26px; margin-bottom: 10px; letter-spacing: 1px; }
        p.subtitle { color: #8b949e; font-size: 14px; margin-bottom: 35px; }

        .input-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 14px 18px; background: #0d1117;
            border: 1px solid var(--border); border-radius: 8px;
            color: white; font-family: 'Rajdhani'; font-size: 16px; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--link); }

        .btn-main {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 8px;
            font-family: 'Rajdhani'; font-weight: 700; font-size: 18px;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(35, 134, 54, 0.3); }

        .toggle-area { margin-top: 25px; font-size: 15px; color: #8b949e; }
        .btn-toggle { background: none; border: none; color: var(--link); font-family: 'Rajdhani'; font-weight: 700; cursor: pointer; text-decoration: underline; }
        
        .status-box { font-size: 14px; margin-bottom: 15px; min-height: 20px; font-weight: 500; }
        .back-link { display: inline-block; margin-top: 35px; color: #8b949e; text-decoration: none; font-size: 13px; font-family: 'Orbitron'; letter-spacing: 1px; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="loader-circle"></div>
        <div id="loader-text">Initializing...</div>
    </div>

    <div class="auth-card">
        <h2 id="title">Sign Up</h2>
        <p class="subtitle" id="subtitle">Create an account to start browsing.</p>
        
        <div id="status-msg" class="status-box"></div>
        
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Choose Username" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Create Password">
        </div>
        
        <button class="btn-main" id="mainBtn">Create Account</button>
        
        <div class="toggle-area">
            <span id="toggleText">Already have an account?</span> 
            <button class="btn-toggle" id="toggleMode">Sign In</button>
        </div>
        
        <a href="market.html" class="back-link">← Back to Aetherfall Market</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBVvsUZJlFEMsdjH7FSXxmxCMZgU_zLzBg",
            authDomain: "quickaetherfall.firebaseapp.com",
            projectId: "quickaetherfall",
            storageBucket: "quickaetherfall.firebasestorage.app",
            messagingSenderId: "1061970586865",
            appId: "1:1061970586865:web:ad87fa9b304b0909d04d50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLoginMode = false;
        const loader = document.getElementById('loader-overlay');
        const loaderText = document.getElementById('loader-text');
        const msg = document.getElementById('status-msg');
        const mainBtn = document.getElementById('mainBtn');
        const toggleBtn = document.getElementById('toggleMode');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const toggleText = document.getElementById('toggleText');

        const notify = (text, color) => { msg.innerText = text; msg.style.color = color; };
        const toEmail = (name) => `${name.trim().toLowerCase()}@market.com`;

        // Function to update UI Text
        function updateUI() {
            if (isLoginMode) {
                title.innerText = "Log In";
                subtitle.innerText = "Welcome back! Enter your details.";
                mainBtn.innerText = "Sign In";
                toggleText.innerText = "Need an account?";
                toggleBtn.innerText = "Sign up";
                document.getElementById('userInput').placeholder = "Username";
                document.getElementById('passInput').placeholder = "Password";
            } else {
                title.innerText = "Sign Up";
                subtitle.innerText = "Create an account to start browsing.";
                mainBtn.innerText = "Create Account";
                toggleText.innerText = "Already have an account?";
                toggleBtn.innerText = "Sign in";
                document.getElementById('userInput').placeholder = "Choose Username";
                document.getElementById('passInput').placeholder = "Create Password";
            }
            notify("", "");
        }

        // Check if user clicked "Log In" or "Sign Up" from Market
        function checkMode() {
            if (window.location.hash === "#login") {
                isLoginMode = true;
            } else {
                isLoginMode = false;
            }
            updateUI();
        }

        window.addEventListener('load', checkMode);
        window.addEventListener('hashchange', checkMode);

        toggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            window.location.hash = isLoginMode ? "login" : "signup";
            updateUI();
        });

        mainBtn.addEventListener('click', () => {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            
            if (!user || !pass) return notify("Please fill in all fields.", "#ff7b72");

            // TRIGGER COOL LOADING UI
            loader.style.display = 'flex';
            loaderText.innerText = "Loading...";
            loaderText.style.color = "#238636";

            const action = isLoginMode 
                ? signInWithEmailAndPassword(auth, toEmail(user), pass)
                : createUserWithEmailAndPassword(auth, toEmail(user), pass);

            action.then(() => {
                // SAVES USERNAME & SHOWS SUCCESS
                localStorage.setItem("market_user", user.toUpperCase());
                loaderText.innerText = "SUCCESSFUL";
                
                setTimeout(() => { 
                    window.location.href = "market.html"; 
                }, 1500);
            }).catch((err) => {
                loader.style.display = 'none';
                let errorMsg = "Authentication Failed";
                if(err.code === "auth/user-not-found") errorMsg = "User not found.";
                if(err.code === "auth/wrong-password") errorMsg = "Incorrect password.";
                notify(errorMsg, "#ff7b72");
            });
        });
    </script>
</body>
</html>
