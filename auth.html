<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Login</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #161b22; padding: 30px; border: 1px solid #30363d; border-radius: 8px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-sign-in { background: #238636; color: white; }
        .btn-create { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Market Access</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        
        <button class="btn-sign-in" onclick="login()">Sign In</button>
        <button class="btn-create" onclick="signUp()">Create Account</button>
        
        <p style="font-size: 12px; margin-top: 15px;"><a href="index.html" style="color: #58a6ff; text-decoration: none;">← Back Home</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // Your actual config from the screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyBVvsUZJlFEMsdjH7FSXxmxCMZgU_zLzBg",
            authDomain: "quickaetherfall.firebaseapp.com",
            projectId: "quickaetherfall",
            storageBucket: "quickaetherfall.firebasestorage.app",
            messagingSenderId: "1061970586865",
            appId: "1:1061970586865:web:ad87fa9b304b0909d04d50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Helper to turn username into email format for Firebase
        const formatUser = (u) => `${u.trim()}@market.com`;

        window.signUp = () => {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!u || !p) return alert("Enter username and password");

            createUserWithEmailAndPassword(auth, formatUser(u), p)
                .then(() => {
                    localStorage.setItem("username", u);
                    alert("Welcome! Account created.");
                    window.location.href = "market.html";
                })
                .catch(e => alert("Error: " + e.message));
        };

        window.login = () => {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;

            signInWithEmailAndPassword(auth, formatUser(u), p)
                .then(() => {
                    localStorage.setItem("username", u);
                    window.location.href = "market.html";
                })
                .catch(e => alert("Login failed. Check your details."));
        };
    </script>
</body>
</html>
