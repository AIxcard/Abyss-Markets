<!DOCTYPE html>

<html>

<head>
<title>SJW Header Test</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
}

/* HERO IMAGE */

.hero{
position:relative;
width:100%;
height:600px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.55) contrast(1.1);
}

/* TITLE */

.hero h1{
position:relative;

font-size:90px;
font-weight:bold;
letter-spacing:8px;

color:#60a5fa;

text-shadow:
0 0 10px #2563eb,
0 0 25px #2563eb,
0 0 60px #1e40af,
0 0 100px #1e40af;
}

</style>

</head>

<body>

<div class="hero">

<img src="https://fictionhorizon.com/wp-content/uploads/2024/01/Solo-Leveling-Sung-Jin-Woo.jpg">

<h1>ABYSSAL MARKET</h1>

</div>

</body>

</html>
