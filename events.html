<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aetherfall | Event Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #c084fc; --bg: #020205; --panel: rgba(13, 13, 25, 0.95);
            --q-col: #ff00ff; --w-col: #00ffff; --e-col: #ffff00; --r-col: #00ff00; --t-col: #ff4400;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; user-select: none; }

        /* --- MAIN HUB --- */
        #event-hub { display: flex; width: 100%; height: 100%; padding: 30px; box-sizing: border-box; transition: filter 0.3s; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .event-card {
            background: rgba(88, 28, 135, 0.2); border: 2px solid #5b21b6; padding: 15px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .main-panel { flex: 1; padding-left: 50px; }
        .details-box { background: var(--panel); border: 1px solid #333; padding: 40px; max-width: 650px; border-radius: 12px; position: relative; }
        
        /* Progress Bar */
        .bar-bg { width: 100%; height: 12px; background: #111; border-radius: 6px; margin-top: 8px; overflow: hidden; border: 1px solid #333; }
        #prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #c084fc, #6366f1); transition: 1s ease; }

        /* Buttons */
        .av-btn { 
            flex: 1; border: none; padding: 15px; font-family: 'Orbitron'; font-weight: 900; 
            cursor: pointer; border-radius: 4px; font-size: 16px; transition: 0.2s;
        }
        .av-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .settings-trigger { position: fixed; bottom: 20px; left: 20px; background: #1a1a2e; border: 1px solid #444; color: #888; padding: 10px; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; font-size: 12px; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #0a0a0f; border: 2px solid #333; padding: 30px; width: 600px; max-height: 80vh; overflow-y: auto; position: relative; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .shop-item { background: #151520; border: 1px solid #333; padding: 15px; text-align: center; border-radius: 8px; }

        /* --- RHYTHM ENGINE (The "Redo") --- */
        #game-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; }
        .highway { 
            position: absolute; left: 50%; transform: translateX(-50%); width: 400px; height: 100%; 
            background: linear-gradient(to bottom, #050508, #0a0a15); border-inline: 4px solid #2a2a35; 
        }
        /* Judgment Line at the VERY bottom */
        .judgement-line { position: absolute; bottom: 0; width: 100%; height: 60px; background: rgba(192, 132, 252, 0.1); border-top: 3px solid var(--accent); display: flex; justify-content: space-around; align-items: center; }
        .key-label { font-family: 'Orbitron'; font-size: 14px; color: rgba(255,255,255,0.5); }

        .note { position: absolute; width: 60px; height: 25px; border-radius: 4px; transform: translateX(-50%); box-shadow: 0 0 15px currentColor; }

        /* Floating Score inside Highway */
        .highway-ui { position: absolute; bottom: 80px; right: -180px; width: 150px; text-align: right; pointer-events: none; }
        #live-score { font-family: 'Orbitron'; font-size: 28px; color: white; }
        #combo-txt { font-family: 'Orbitron'; font-size: 45px; font-weight: 900; color: var(--accent); margin-top: -10px; }

        /* Judgment Text (Perfect/Good/Miss) */
        .judgment-popup {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron'; font-weight: 900; font-size: 32px;
            pointer-events: none; animation: popOut 0.4s ease-out forwards;
        }
        @keyframes popOut {
            0% { transform: translate(-50%, -20%) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -80%) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="event-hub">
    <div class="sidebar">
        <h3 style="font-family:'Orbitron'; color: var(--accent);">AETHERFALL EVENTS</h3>
        <div class="event-card">
            <span style="font-size: 24px; font-weight: 900;">01</span>
            <div><b>Skele King's Jam</b><br><small style="color: #22c55e;">ACTIVE</small></div>
        </div>
    </div>

    <div class="main-panel">
        <div class="details-box">
            <h1 style="font-family:'Orbitron'; font-size: 40px; margin:0;">Skele King's Jam</h1>
            <p>Earn high scores to unlock Corrupted Skins and Boosts!</p>
            
            <div class="bar-bg"><div id="prog-fill"></div></div>
            <p>Owned: <span id="coin-txt" style="color: gold; font-weight: bold;">0x</span> Corrupted Coins</p>

            <div style="display:flex; gap: 10px;">
                <button class="av-btn" style="background: #a855f7;" onclick="openModal('shop')">SHOP</button>
                <button class="av-btn" style="background: #22c55e;" onclick="openModal('play')">PLAY</button>
            </div>
        </div>
    </div>
</div>

<button class="settings-trigger" onclick="openModal('settings')">⚙️ SETTINGS</button>

<div id="shop-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'">EVENT SHOP</h2>
        <div class="shop-grid">
            <div class="shop-item">
                <h3>Neon Reaper Skin</h3>
                <button class="av-btn" style="background:var(--accent)" onclick="buy('skin_neon', 50)">50 Coins</button>
            </div>
            <div class="shop-item">
                <h3>Score Boost (2x)</h3>
                <button class="av-btn" style="background:gold; color:black" onclick="buy('boost_score', 20)">20 Coins</button>
            </div>
        </div>
        <button class="av-btn" style="background:#222" onclick="closeModals()">BACK</button>
    </div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content" style="width:300px">
        <h2 style="font-family:'Orbitron'">KEY BINDS</h2>
        <div id="bind-inputs"></div>
        <button class="av-btn" style="background:#22c55e; margin-top:20px;" onclick="closeModals()">SAVE</button>
    </div>
</div>

<div id="game-screen">
    <div class="highway">
        <div class="highway-ui">
            <div style="font-size:10px; opacity:0.5; font-family:'Orbitron';">SCORE</div>
            <div id="live-score">000000</div>
            <div id="combo-txt">0</div>
            <div style="font-size:10px; opacity:0.5; font-family:'Orbitron';">COMBO</div>
        </div>
        <div id="note-layer"></div>
        <div class="judgement-line" id="anchors"></div>
    </div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('av_data')) || {
        coins: 100,
        keys: ['q', 'w', 'e', 'r', 't'],
        best: 0,
        skin: 'default'
    };

    let isPlaying = false, score = 0, combo = 0, activeNotes = [];
    const laneColors = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00', '#ff4400'];

    function save() {
        localStorage.setItem('av_data', JSON.stringify(state));
        document.getElementById('coin-txt').innerText = state.coins;
    }

    function openModal(m) {
        if(m === 'settings') renderSettings();
        document.getElementById(m + '-modal').style.display = 'flex';
    }

    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }

    function renderSettings() {
        const container = document.getElementById('bind-inputs');
        container.innerHTML = state.keys.map((k, i) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>Lane ${i+1}</span>
                <input style="width:40px; text-align:center; background:#111; color:var(--accent); border:1px solid #444;" 
                       value="${k.toUpperCase()}" onchange="state.keys[${i}]=this.value.toLowerCase(); save();">
            </div>
        `).join('');
    }

    function buy(item, price) {
        if(state.coins >= price) { state.coins -= price; save(); alert("Unlocked!"); }
        else alert("Need more coins!");
    }

    // --- GAME ENGINE ---
    function initMatch() {
        isPlaying = true; score = 0; combo = 0;
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('anchors').innerHTML = state.keys.map(k => `<div class="key-label">${k.toUpperCase()}</div>`).join('');
        gameLoop();
        spawnInterval = setInterval(spawnNote, 600);
    }

    function spawnNote() {
        if(!isPlaying) return;
        const lane = Math.floor(Math.random() * 5);
        const el = document.createElement('div');
        el.className = 'note';
        el.style.left = (lane * 20 + 10) + "%";
        el.style.color = laneColors[lane];
        el.style.backgroundColor = laneColors[lane];
        document.getElementById('note-layer').appendChild(el);
        activeNotes.push({ el, y: -50, lane, hit: false });
    }

    function gameLoop() {
        if(!isPlaying) return;
        const speed = 8;
        const screenH = window.innerHeight;

        activeNotes.forEach((n, i) => {
            n.y += speed;
            n.el.style.top = n.y + 'px';

            if(n.y > screenH - 60 && !n.hit) {
                // Auto-miss if it passes the line
                if(n.y > screenH) {
                    if(!n.hit) triggerJudgment('Miss');
                    n.el.remove();
                    activeNotes.splice(i, 1);
                }
            }
        });
        requestAnimationFrame(gameLoop);
    }

    function triggerJudgment(type) {
        const colors = { 'Perfect': '#00ffff', 'Good': '#c084fc', 'Miss': '#ff4444' };
        const popup = document.createElement('div');
        popup.className = 'judgment-popup';
        popup.innerText = type.toUpperCase();
        popup.style.color = colors[type];
        popup.style.textShadow = `0 0 15px ${colors[type]}`;
        document.querySelector('.highway').appendChild(popup);
        setTimeout(() => popup.remove(), 400);

        if(type === 'Miss') combo = 0;
        else combo++;
        
        document.getElementById('live-score').innerText = score.toString().padStart(6, '0');
        document.getElementById('combo-txt').innerText = combo;
    }

    window.onkeydown = (e) => {
        if(!isPlaying) {
            if(e.code === 'Space') initMatch(); // Quick start with Space
            return;
        }
        const lane = state.keys.indexOf(e.key.toLowerCase());
        if(lane === -1) return;

        const targetY = window.innerHeight - 60;
        const hitNote = activeNotes.find(n => n.lane === lane && !n.hit && Math.abs(n.y - targetY) < 100);

        if(hitNote) {
            const diff = Math.abs(hitNote.y - targetY);
            hitNote.hit = true;
            hitNote.el.style.display = 'none';
            
            if(diff < 30) { score += 150; triggerJudgment('Perfect'); }
            else { score += 100; triggerJudgment('Good'); }
        }
    };

    save();
</script>
</body>
</html>
