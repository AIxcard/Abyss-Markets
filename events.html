<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetherfall | Requiem</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c084fc; --bg: #020205; --panel: rgba(13, 13, 25, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; touch-action: none; }

        /* --- HUB --- */
        #event-hub { display: flex; width: 100%; height: 100%; padding: 2vw; position: relative; }
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .details-box { background: var(--panel); border: 1px solid #333; padding: 30px; width: 90%; max-width: 600px; border-radius: 12px; border-top: 4px solid var(--accent); }
        .bar-bg { width: 100%; height: 12px; background: #111; border-radius: 6px; margin: 15px 0; border: 1px solid #333; overflow: hidden; }
        #prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #c084fc, #6366f1); transition: 1s ease; }
        .av-btn { flex: 1; border: none; padding: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 4px; font-size: 14px; transition: 0.2s; color: white; text-transform: uppercase; }
        .av-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.2); }
        .av-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #0a0a0f; border: 2px solid #333; padding: 30px; width: 90%; max-width: 600px; border-radius: 12px; }
        .mission-row { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }

        /* --- RHYTHM ENGINE (Anime Vanguards Scale) --- */
        #game-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; }
        .highway { 
            position: absolute; left: 50%; transform: translateX(-50%); 
            width: 70vh; max-width: 95vw; height: 100%; 
            background: rgba(5, 5, 8, 0.95); border-inline: 2px solid #222; 
        }
        .note { 
            position: absolute; width: 12%; aspect-ratio: 1/1; border-radius: 50%; 
            transform: translateX(-50%); border: 3px solid #fff; 
            box-shadow: 0 0 15px currentColor; background: radial-gradient(circle, #fff 0%, currentColor 70%);
            pointer-events: none; z-index: 3010;
        }
        #mobile-touch-container { display: flex; position: fixed; inset: 0; z-index: 3020; }
        .touch-lane { flex: 1; height: 100%; border-right: 1px solid rgba(255,255,255,0.05); }
        .judgement-line { position: absolute; bottom: 10%; width: 100%; height: 80px; border-top: 4px solid var(--accent); background: linear-gradient(to bottom, rgba(192, 132, 252, 0.2), transparent); }
        
        /* --- FEEDBACK TEXT --- */
        .judgment-msg { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            font-family: 'Orbitron'; font-weight: 900; font-size: 70px; 
            pointer-events: none; z-index: 5000; text-shadow: 0 0 10px #000;
            animation: popFeedback 0.4s ease-out forwards; 
        }
        @keyframes popFeedback { 0% { opacity:1; transform: translate(-50%, 0) scale(0.6); } 100% { opacity:0; transform: translate(-50%, -80px) scale(1.1); } }
    </style>
</head>
<body>

<div id="event-hub">
    <div class="sidebar">
        <h2 style="font-family:'Orbitron'; color: var(--accent); margin:0;">REQUIEM</h2>
        <div id="reset-timer" style="font-size:12px; color:#666; font-family:'Orbitron';">RESETS IN: --:--:--</div>
        <div style="background:rgba(88,28,135,0.2); padding:15px; border:1px solid var(--accent);">
            <b>Hollow King</b><br><small style="color:#22c55e;">LIVE TRIAL</small>
        </div>
    </div>

    <div class="main-panel">
        <div class="details-box">
            <h1 style="font-family:'Orbitron'; margin:0;">REQUIEM</h1>
            <p style="opacity:0.7;">The final movement has begun. Silence the Hollow King's final movement or be erased by the crescendo.</p>
            <div class="bar-bg"><div id="prog-fill"></div></div>
            <p>Soul Shards: <span id="coin-txt" style="color:gold; font-weight:bold;">0</span></p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="av-btn" style="background:#a855f7;" onclick="openModal('shop')">Ossuary</button>
                <button class="av-btn" style="background:#22c55e;" onclick="openModal('stage')">Enter</button>
                <button class="av-btn" style="background:#eab308;" onclick="openModal('missions')">Trials</button>
            </div>
        </div>
    </div>
</div>

<div id="stage-modal" class="modal-overlay"><div class="modal-content"><h2 style="font-family:'Orbitron'; text-align:center;">SELECT MOVEMENT</h2><div id="diff-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div><button class="av-btn" style="background:#222; margin-top:20px; width:100%" onclick="closeModals()">Back</button></div></div>
<div id="missions-modal" class="modal-overlay"><div class="modal-content"><h2 style="font-family:'Orbitron';">DAILY TRIALS</h2><div id="mission-list"></div><button class="av-btn" style="background:#222; margin-top:20px; width:100%" onclick="closeModals()">Close</button></div></div>
<div id="shop-modal" class="modal-overlay"><div class="modal-content"><h2 style="font-family:'Orbitron';">OSSUARY</h2><div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"><div style="background:#111; padding:15px; text-align:center;"><h4>Sovereign’s Shroud</h4><button class="av-btn" id="buy-skin" style="background:#444" onclick="buy('skin', 100)">100x</button></div><div style="background:#111; padding:15px; text-align:center;"><h4>Void-Stained Echo</h4><button class="av-btn" id="buy-vfx" style="background:#444" onclick="buy('vfx', 150)">150x</button></div></div><button class="av-btn" style="background:#222; margin-top:20px; width:100%" onclick="closeModals()">Close</button></div></div>

<div id="game-screen">
    <div id="game-timer-display" style="position:fixed; top:20px; left:20px; font-family:'Orbitron'; font-size:24px; color:var(--accent);">01:00</div>
    <div id="mobile-touch-container">
        <div class="touch-lane" onpointerdown="handleHit(0)"></div>
        <div class="touch-lane" onpointerdown="handleHit(1)"></div>
        <div class="touch-lane" onpointerdown="handleHit(2)"></div>
        <div class="touch-lane" onpointerdown="handleHit(3)"></div>
        <div class="touch-lane" onpointerdown="handleHit(4)"></div>
    </div>
    <div class="highway"><div id="note-layer"></div><div class="judgement-line"></div></div>
    <div style="position:fixed; bottom:20px; right:20px; text-align:right;">
        <div id="live-score" style="font-size:24px; font-family:'Orbitron';">000000</div>
        <div id="combo-txt" style="font-size:60px; font-family:'Orbitron'; color:var(--accent); font-weight:900;">0</div>
    </div>
</div>

<script>
    let state = {
        shards: 50, lastReset: 0,
        missions: [
            { id: 0, label: "Clear Prelude", req: 2000, diff: 'prelude', reward: 25, status: 'none' },
            { id: 1, label: "Silence the Sonata", req: 10000, diff: 'sonata', reward: 50, status: 'none' },
            { id: 2, label: "Final Crescendo", req: 30000, diff: 'crescendo', reward: 150, status: 'none' }
        ],
        bought: []
    };

    function save() { localStorage.setItem('Aetherfall_Requiem_Final', JSON.stringify(state)); }
    function load() {
        let data = localStorage.getItem('Aetherfall_Requiem_Final');
        if(data) state = JSON.parse(data);
        checkReset();
        updateUI();
    }

    function checkReset() {
        const now = Date.now();
        if (now - state.lastReset > 86400000) {
            state.missions.forEach(m => m.status = 'none');
            state.lastReset = new Date().setHours(0,0,0,0);
            save();
        }
    }

    setInterval(() => {
        const diff = (state.lastReset + 86400000) - Date.now();
        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
        document.getElementById('reset-timer').innerText = `RESETS IN: ${h}:${m}:${s}`;
    }, 1000);

    function updateUI() {
        document.getElementById('coin-txt').innerText = state.shards;
        let claimed = state.missions.filter(m => m.status === 'claimed').length;
        document.getElementById('prog-fill').style.width = (claimed / 3 * 100) + '%';
        state.bought.forEach(i => { if(document.getElementById('buy-'+i)) document.getElementById('buy-'+i).innerText = "OWNED"; });
    }

    function openModal(id) {
        if(id === 'stage') renderDiffs();
        if(id === 'missions') renderMissions();
        document.getElementById(id + '-modal').style.display = 'flex';
    }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); save(); }

    function renderDiffs() {
        document.getElementById('diff-list').innerHTML = ['prelude', 'sonata', 'scherzo', 'crescendo'].map(d => `
            <button class="av-btn" style="background:#111; border:1px solid #333;" onclick="startRhythm('${d}')">${d}</button>
        `).join('');
    }

    function renderMissions() {
        document.getElementById('mission-list').innerHTML = state.missions.map(m => {
            let btn = `<button class="av-btn" style="background:#444" disabled>LOCKED</button>`;
            if(m.status === 'ready') btn = `<button class="av-btn" style="background:var(--accent)" onclick="claimMission(${m.id})">CLAIM</button>`;
            if(m.status === 'claimed') btn = `<button class="av-btn" style="background:#22c55e" disabled>CLAIMED</button>`;
            return `<div class="mission-row"><div><b>${m.label}</b><br>${m.reward} Shards</div>${btn}</div>`;
        }).join('');
    }

    function claimMission(id) {
        let m = state.missions.find(x => x.id === id);
        if(m.status === 'ready') { m.status = 'claimed'; state.shards += m.reward; save(); updateUI(); renderMissions(); }
    }

    // --- GAME ENGINE ---
    let activeNotes = [], score = 0, combo = 0, isPlaying = false, spawnInt, timerInt, timeLeft = 60;
    const colors = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00', '#ff4400'];

    function startRhythm(d) {
        state.currentDiff = d; closeModals(); isPlaying = true; score = 0; combo = 0; activeNotes = []; timeLeft = 60;
        document.getElementById('game-screen').style.display = 'block';
        let rate = {prelude: 800, sonata: 600, scherzo: 450, crescendo: 300}[d];
        spawnInt = setInterval(spawnNote, rate);
        timerInt = setInterval(() => { timeLeft--; document.getElementById('game-timer-display').innerText = `00:${timeLeft.toString().padStart(2,'0')}`; if(timeLeft<=0) finalizeGame(); }, 1000);
        requestAnimationFrame(gameUpdate);
    }

    function spawnNote() {
        if(!isPlaying) return;
        const lane = Math.floor(Math.random() * 5);
        const el = document.createElement('div');
        el.className = 'note'; el.style.left = (lane * 20 + 10) + "%"; el.style.color = colors[lane];
        document.getElementById('note-layer').appendChild(el);
        activeNotes.push({ el, y: -50, lane, hit: false });
    }

    function gameUpdate() {
        if(!isPlaying) return;
        let speed = {prelude: 0.8, sonata: 1.1, scherzo: 1.4, crescendo: 1.8}[state.currentDiff] * (window.innerHeight / 100);
        for (let i = activeNotes.length - 1; i >= 0; i--) {
            let n = activeNotes[i]; n.y += speed; n.el.style.top = n.y + 'px';
            if(n.y > window.innerHeight) { 
                if(!n.hit) { combo = 0; score = Math.max(0, score - 150); renderJudg('MISSED', '#ff0000'); }
                n.el.remove(); activeNotes.splice(i, 1);
            }
        }
        document.getElementById('live-score').innerText = score.toString().padStart(6, '0');
        document.getElementById('combo-txt').innerText = combo;
        requestAnimationFrame(gameUpdate);
    }

    function handleHit(lane) {
        if(!isPlaying) return;
        const zone = window.innerHeight * 0.9;
        const idx = activeNotes.findIndex(n => n.lane === lane && !n.hit && Math.abs(n.y - zone) < 150);
        if(idx !== -1) {
            let n = activeNotes[idx]; n.hit = true; let off = Math.abs(n.y - zone);
            n.el.remove(); activeNotes.splice(idx, 1);
            if(off < 45) { score += 200; combo++; renderJudg('PERFECT', '#0ff'); }
            else { score += 150; combo++; renderJudg('GOOD', '#c084fc'); }
        } else { combo = 0; renderJudg('MISSED', '#ff0000'); }
    }

    function renderJudg(t, c) {
        const d = document.createElement('div');
        d.className = 'judgment-msg'; d.innerText = t; d.style.color = c;
        document.getElementById('game-screen').appendChild(d);
        setTimeout(() => d.remove(), 400);
    }

    function finalizeGame() {
        isPlaying = false; clearInterval(spawnInt); clearInterval(timerInt);
        state.missions.forEach(m => { if(m.diff === state.currentDiff && score >= m.req && m.status === 'none') m.status = 'ready'; });
        alert(`MOVEMENT ENDED\nSCORE: ${score}`);
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('note-layer').innerHTML = '';
        save(); updateUI();
    }

    window.onload = load;
</script>
</body>
</html>
