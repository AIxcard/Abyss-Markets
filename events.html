<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetherfall | Event Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c084fc; --bg: #020205; --panel: rgba(13, 13, 25, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; touch-action: none; }

        /* --- HUB LAYOUT --- */
        #event-hub { display: flex; width: 100%; height: 100%; padding: 2vw; position: relative; }
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .event-card {
            background: rgba(88, 28, 135, 0.2); padding: 20px; display: flex; align-items: center; gap: 15px; 
            cursor: pointer; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
            clip-path: polygon(5% 0, 100% 0, 100% 75%, 95% 100%, 0 100%, 0 25%);
        }

        .main-panel { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; }
        .details-box { background: var(--panel); border: 1px solid #333; padding: 30px; width: 90%; max-width: 600px; border-radius: 12px; }

        .bar-bg { width: 100%; height: 12px; background: #111; border-radius: 6px; margin: 15px 0; border: 1px solid #333; overflow: hidden; }
        #prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #c084fc, #6366f1); transition: 1s ease; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .av-btn { flex: 1; border: none; padding: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 4px; font-size: 14px; transition: 0.2s; color: white; text-transform: uppercase; }
        .av-btn:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.2); }
        .av-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .bottom-controls { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .ctrl-btn { background: #1a1a2e; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; border-radius: 4px; width: 150px; text-transform: uppercase;}

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0a0f; border: 2px solid #333; padding: 30px; width: 100%; max-width: 800px; border-radius: 12px; position: relative; max-height: 90vh; overflow-y: auto; }
        .mission-row { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }

        /* --- ANIME VANGUARDS STYLE RHYTHM ENGINE --- */
        #game-screen { display: none; position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); z-index: 3000; }
        
        /* The Highway scales based on screen height to keep it playable on iPad/Mobile */
        .highway { 
            position: absolute; left: 50%; transform: translateX(-50%); 
            width: 90vw; max-width: 500px; height: 100%; 
            background: rgba(5, 5, 8, 0.8); border-inline: 2px solid rgba(192, 132, 252, 0.3); 
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        
        .note { 
            position: absolute; width: 12%; aspect-ratio: 1/1; border-radius: 50%; 
            transform: translateX(-50%); border: 3px solid #fff; 
            box-shadow: 0 0 15px currentColor;
            background: radial-gradient(circle, #fff 0%, currentColor 70%);
            pointer-events: none; z-index: 3010;
        }

        #mobile-touch-container { display: none; position: fixed; inset: 0; z-index: 3020; }
        .touch-lane { flex: 1; height: 100%; opacity: 0; transition: opacity 0.1s; }
        .touch-lane:active { opacity: 0.2; background: white; }

        .judgement-line { position: absolute; bottom: 10%; width: 100%; height: 80px; border-top: 4px solid var(--accent); background: linear-gradient(to bottom, rgba(192, 132, 252, 0.2), transparent); display: flex; justify-content: space-around; align-items: center; }
        
        .score-ui { position: absolute; top: 20px; right: 20px; text-align: right; font-family: 'Orbitron'; }
        #combo-txt { font-size: 60px; color: var(--accent); font-weight: 900; }

        .judgment-msg { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            font-family: 'Orbitron'; font-weight: 900; font-size: 8vw; max-font-size: 80px;
            pointer-events: none; z-index: 5000; text-shadow: 0 0 20px #000;
            animation: popFeedback 0.4s ease-out forwards; 
        }
        @keyframes popFeedback { 0% { opacity:1; transform: translate(-50%, 0) scale(0.5); } 100% { opacity:0; transform: translate(-50%, -100px) scale(1.2); } }
    </style>
</head>
<body>

<div id="event-hub">
    <div class="sidebar">
        <h3 style="font-family:'Orbitron'; color: var(--accent); margin:0;">EVENT HUB</h3>
        <div id="reset-timer" style="font-size:14px; color:#888;">Resets in: 00:00:00</div>
        <div class="event-card">
            <span style="font-family:'Orbitron'; font-size: 24px; font-weight: 900;">1</span>
            <div><b>Skele King's Jam</b><br><small style="color: #22c55e;">LIVE NOW</small></div>
        </div>
    </div>

    <div class="main-panel">
        <div class="details-box">
            <h1 style="font-family:'Orbitron'; font-size: clamp(24px, 5vw, 42px); margin:0;">Skele King's Jam Session</h1>
            <div class="bar-bg"><div id="prog-fill"></div></div>
            <p style="font-size: 18px;">Event Currency: <span id="coin-txt" style="color: gold; font-weight: bold;">0x</span></p>
            <div class="btn-row">
                <button class="av-btn" style="background: #a855f7;" onclick="openModal('shop')">Shop</button>
                <button class="av-btn" style="background: #22c55e;" onclick="openModal('stage')">Play</button>
                <button class="av-btn" style="background: #eab308;" onclick="openModal('missions')">Missions</button>
            </div>
        </div>
    </div>

    <div class="bottom-controls">
        <button class="ctrl-btn" onclick="window.location.href='game.html'">Back to Game</button>
        <button class="ctrl-btn" onclick="openModal('settings')">⚙ Settings</button>
    </div>
</div>

<div id="stage-modal" class="modal-overlay"><div class="modal-content"><h1 style="font-family:'Orbitron'; text-align:center;">SELECT DIFFICULTY</h1><div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;" id="diff-list"></div><button class="av-btn" style="background:#222; margin-top:30px; width:100%" onclick="closeModals()">CLOSE</button></div></div>

<div id="missions-modal" class="modal-overlay"><div class="modal-content">
    <h2 style="font-family:'Orbitron';">DAILY MISSIONS</h2>
    <div id="mission-list"></div>
    <button class="av-btn" style="background:#222; margin-top:20px; width:100%" onclick="closeModals()">CLOSE</button>
</div></div>

<div id="game-screen">
    <div id="game-timer-display" style="position:absolute; top:20px; left:20px; font-family:'Orbitron'; font-size:24px; color:var(--accent);">01:00</div>
    <div id="mobile-touch-container">
        <div class="touch-lane" onpointerdown="handleHit(0)"></div>
        <div class="touch-lane" onpointerdown="handleHit(1)"></div>
        <div class="touch-lane" onpointerdown="handleHit(2)"></div>
        <div class="touch-lane" onpointerdown="handleHit(3)"></div>
        <div class="touch-lane" onpointerdown="handleHit(4)"></div>
    </div>
    <button style="position:fixed; top:20px; right:20px; z-index:6000; background:rgba(255,0,0,0.2); border:1px solid red; color:red; padding:8px; cursor:pointer; font-family:'Orbitron';" onclick="forceExit()">EXIT</button>
    
    <div class="highway">
        <div id="note-layer"></div>
        <div class="judgement-line" id="key-hints"></div>
    </div>
    
    <div class="score-ui">
        <div id="live-score" style="font-size:20px; opacity:0.8;">000000</div>
        <div id="combo-txt">0</div>
        <div style="font-size:12px; opacity:0.5; letter-spacing:2px;">COMBO</div>
    </div>
</div>

<script>
    // --- STATE ---
    let state = {
        coins: 50,
        keys: ['q', 'w', 'e', 'r', 't'],
        inputMode: 'pc',
        bestScores: { easy: 0, medium: 0, hard: 0, expert: 0 },
        lastReset: 0, // Timestamp of last daily reset
        missions: [
            { id: 0, label: "Clear Easy Mode", req: 2000, diff: 'easy', reward: 20, status: 'none' },
            { id: 1, label: "Score 10k on Medium", req: 10000, diff: 'medium', reward: 50, status: 'none' },
            { id: 2, label: "Master Expert Mode", req: 30000, diff: 'expert', reward: 150, status: 'none' }
        ]
    };

    function save() { localStorage.setItem('Aetherfall_Events_V2', JSON.stringify(state)); }
    
    function load() {
        let data = localStorage.getItem('Aetherfall_Events_V2');
        if(data) state = JSON.parse(data);
        checkDailyReset();
        refreshUI();
    }

    // --- DAILY RESET LOGIC ---
    function checkDailyReset() {
        const now = Date.now();
        const oneDay = 24 * 60 * 60 * 1000;
        if (now - state.lastReset > oneDay) {
            state.missions.forEach(m => m.status = 'none');
            state.lastReset = new Date().setHours(0,0,0,0); // Set to start of today
            save();
        }
    }

    function updateResetTimer() {
        const now = new Date();
        const tomorrow = new Date(state.lastReset + 24 * 60 * 60 * 1000);
        const diff = tomorrow - now;
        const h = Math.floor(diff / 3600000).toString().padStart(2,'0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        document.getElementById('reset-timer').innerText = `Resets in: ${h}:${m}:${s}`;
    }
    setInterval(updateResetTimer, 1000);

    // --- MISSIONS ---
    function renderMissions() {
        document.getElementById('mission-list').innerHTML = state.missions.map(m => {
            let btn = '';
            if(m.status === 'none') btn = `<button class="av-btn" style="background:#444" disabled>INCOMPLETE</button>`;
            if(m.status === 'ready') btn = `<button class="av-btn" style="background:var(--accent)" onclick="claimMission(${m.id})">CLAIM ${m.reward}x</button>`;
            if(m.status === 'claimed') btn = `<button class="av-btn" style="background:#22c55e" disabled>CLAIMED</button>`;
            
            return `
                <div class="mission-row" style="opacity: ${m.status === 'claimed' ? 0.5 : 1}">
                    <div><b>${m.label}</b><br><small>Reward: ${m.reward} Coins</small></div>
                    ${btn}
                </div>
            `;
        }).join('');
    }

    function claimMission(id) {
        let m = state.missions.find(x => x.id === id);
        if(m && m.status === 'ready') {
            m.status = 'claimed';
            state.coins += m.reward;
            save();
            refreshUI();
            renderMissions();
        }
    }

    // --- UI HELPERS ---
    function refreshUI() {
        document.getElementById('coin-txt').innerText = state.coins + "x";
        let claimedCount = state.missions.filter(m => m.status === 'claimed').length;
        document.getElementById('prog-fill').style.width = (claimedCount / state.missions.length * 100) + '%';
    }

    function openModal(id) {
        if(id === 'stage') renderDiffs();
        if(id === 'missions') renderMissions();
        document.getElementById(id + '-modal').style.display = 'flex';
    }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

    function renderDiffs() {
        document.getElementById('diff-list').innerHTML = ['easy', 'medium', 'hard', 'expert'].map(d => `
            <div style="background:#111; padding:15px; border-radius:8px; text-align:center; border:1px solid #333;">
                <h3 style="text-transform:uppercase; margin:0 0 10px 0;">${d}</h3>
                <button class="av-btn" style="background:var(--accent); width:100%;" onclick="startRhythm('${d}')">PLAY</button>
            </div>
        `).join('');
    }

    // --- RHYTHM ENGINE (Anime Vanguards Scaled) ---
    let activeNotes = [], score = 0, combo = 0, isPlaying = false, spawnInt, timerInt, timeLeft = 60;
    const laneColors = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00', '#ff4400'];

    function startRhythm(d) {
        state.currentDiff = d;
        closeModals();
        isPlaying = true; score = 0; combo = 0; activeNotes = []; timeLeft = 60;
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('mobile-touch-container').style.display = 'flex';
        document.getElementById('key-hints').innerHTML = state.keys.map(k => `<div style="flex:1; text-align:center; opacity:0.3; font-family:'Orbitron'; font-size:10px;">${k.toUpperCase()}</div>`).join('');
        
        let rate = {easy: 800, medium: 600, hard: 450, expert: 300}[d];
        spawnInt = setInterval(spawnNote, rate);
        timerInt = setInterval(updateTimer, 1000);
        requestAnimationFrame(gameUpdate);
    }

    function spawnNote() {
        if(!isPlaying) return;
        const lane = Math.floor(Math.random() * 5);
        const el = document.createElement('div');
        el.className = 'note';
        el.style.left = (lane * 20 + 10) + "%";
        el.style.color = laneColors[lane];
        document.getElementById('note-layer').appendChild(el);
        activeNotes.push({ el, y: -50, lane, hit: false });
    }

    function gameUpdate() {
        if(!isPlaying) return;
        let speed = {easy: 0.8, medium: 1.1, hard: 1.4, expert: 1.8}[state.currentDiff] * (window.innerHeight / 100);
        
        for (let i = activeNotes.length - 1; i >= 0; i--) {
            let n = activeNotes[i];
            n.y += speed;
            n.el.style.top = n.y + 'px';

            if(n.y > window.innerHeight) {
                if(!n.hit) {
                    combo = 0; score = Math.max(0, score - 150); renderJudg('MISS', '#ff0000');
                }
                n.el.remove();
                activeNotes.splice(i, 1);
                refreshHUD();
            }
        }
        requestAnimationFrame(gameUpdate);
    }

    function handleHit(lane) {
        if(!isPlaying) return;
        const zone = window.innerHeight * 0.9; // Matches the 10% bottom position
        const noteIndex = activeNotes.findIndex(n => n.lane === lane && !n.hit && Math.abs(n.y - zone) < 100);
        
        if(noteIndex !== -1) {
            let n = activeNotes[noteIndex];
            n.hit = true;
            let off = Math.abs(n.y - zone);
            n.el.remove();
            activeNotes.splice(noteIndex, 1);
            if(off < 40) { score += 200; combo++; renderJudg('PERFECT', '#0ff'); }
            else { score += 150; combo++; renderJudg('GOOD', '#c084fc'); }
        } else {
            score = Math.max(0, score - 50); combo = 0; renderJudg('MISFIRE', '#555');
        }
        refreshHUD();
    }

    window.onkeydown = (e) => {
        const lane = state.keys.indexOf(e.key.toLowerCase());
        if(lane !== -1) handleHit(lane);
    };

    function updateTimer() {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('game-timer-display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        if(timeLeft <= 0) finalizeGame();
    }

    function refreshHUD() {
        document.getElementById('live-score').innerText = score.toString().padStart(6, '0');
        document.getElementById('combo-txt').innerText = combo;
    }

    function renderJudg(t, c) {
        const d = document.createElement('div');
        d.className = 'judgment-msg'; d.innerText = t; d.style.color = c;
        document.getElementById('game-screen').appendChild(d);
        setTimeout(() => d.remove(), 400);
    }

    function finalizeGame() {
        isPlaying = false; clearInterval(spawnInt); clearInterval(timerInt);
        
        // Check Missions
        state.missions.forEach(m => {
            if(m.diff === state.currentDiff && score >= m.req && m.status === 'none') {
                m.status = 'ready';
            }
        });

        if(score > state.bestScores[state.currentDiff]) state.bestScores[state.currentDiff] = score;
        
        alert(`GAME OVER\nScore: ${score}`);
        save();
        forceExit();
    }

    function forceExit() {
        isPlaying = false; clearInterval(spawnInt); clearInterval(timerInt);
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('note-layer').innerHTML = '';
        load();
    }

    window.onload = load;
</script>
</body>
</html>
