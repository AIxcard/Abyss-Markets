<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aetherfall | Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010206; --panel: rgba(10, 10, 25, 0.9); --accent: #c084fc;
            --perfect: #00fff2; --good: #ffea00; --miss: #ff004c;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        /* --- EVENT PAGE DESIGN --- */
        #event-page { position: absolute; width: 100%; height: 100%; display: flex; transition: filter 0.3s; }
        .sidebar { width: 350px; background: var(--panel); border-right: 2px solid #1e40af; padding: 30px; display: flex; flex-direction: column; }
        .details { flex: 1; padding: 60px; background: radial-gradient(circle at top right, rgba(192, 132, 252, 0.1), transparent); }
        
        .event-card { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); padding: 15px; margin-bottom: 10px; cursor: pointer; position: relative; }
        .event-card.active { background: rgba(192, 132, 252, 0.2); box-shadow: 0 0 15px var(--accent); }

        .btn { background: #1e1b4b; border: 1px solid #444; color: white; padding: 12px; font-family: 'Orbitron'; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:hover { background: var(--accent); color: black; }
        .play-btn { background: #22c55e; font-size: 20px; height: 60px; }

        /* --- SETTINGS MODAL --- */
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid var(--accent); padding: 20px; z-index: 1000; width: 300px; }
        .key-row { display: flex; justify-content: space-between; margin: 10px 0; font-family: 'Orbitron'; }
        .key-input { width: 50px; background: #222; border: 1px solid var(--accent); color: white; text-align: center; }

        /* --- GAME OVERLAY (TRANSPARENT SIDES) --- */
        #game-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.6); }
        
        /* The Highway (Centered) */
        .highway { position: absolute; left: 50%; transform: translateX(-50%); width: 400px; height: 100%; background: rgba(0,0,0,0.8); border-left: 2px solid #333; border-right: 2px solid #333; }
        .lane { position: absolute; top: 0; width: 20%; height: 100%; border-right: 1px dashed rgba(255,255,255,0.1); }
        .hit-line { position: absolute; bottom: 100px; width: 100%; height: 4px; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .key-label { position: absolute; bottom: 60px; width: 100%; text-align: center; font-family: 'Orbitron'; color: var(--accent); font-size: 18px; }

        .note { position: absolute; width: 80%; left: 10%; height: 35px; background: var(--accent); border-radius: 4px; box-shadow: 0 0 10px var(--accent); }

        /* HUD (Bottom Right) */
        .hud-container { position: absolute; bottom: 40px; right: 40px; text-align: right; font-family: 'Orbitron'; pointer-events: none; }
        #score-display { font-size: 28px; color: #fff; margin-bottom: -5px; }
        #combo-display { font-size: 64px; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        
        #rating-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-family: 'Orbitron'; font-weight: 900; opacity: 0; pointer-events: none; }
        
        .exit-btn { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,0,0,0.5); border: none; color: white; padding: 10px 20px; cursor: pointer; font-family: 'Orbitron'; z-index: 101; }
    </style>
</head>
<body>

<div id="event-page">
    <div class="sidebar">
        <h2 style="font-family:'Orbitron'; letter-spacing: 2px; color: var(--accent);">CURRENT EVENTS</h2>
        <div class="event-card active">
            <b style="font-family:'Orbitron';">FRACTAL RESONANCE</b><br>
            <small>Update 1.0 - Active Now</small>
        </div>
        <button class="btn" onclick="toggleSettings(true)">SETTINGS</button>
        <button class="btn" style="margin-top: auto;" onclick="window.location.href='game.html'">BACK TO MAIN</button>
    </div>

    <div class="details">
        <h1 style="font-family:'Orbitron'; font-size: 60px; margin:0;">Fractal Resonance</h1>
        <p style="font-size: 22px; max-width: 600px; opacity: 0.8;">The Aether is vibrating at a dangerous frequency. Synchronize your clicks to stabilize the fracture and earn rare rewards.</p>
        <div style="background: rgba(255,255,255,0.05); padding: 20px; width: fit-content; border: 1px solid var(--accent);">
            <small>REWARDS:</small><br>
            <span style="color:var(--perfect); font-family: 'Orbitron';">CORRUPTED COINS x15</span>
        </div>
        <button class="btn play-btn" onclick="startGame()">PLAY SESSION</button>
    </div>
</div>

<div id="settings-modal">
    <h3 style="font-family:'Orbitron'; margin-top:0;">KEY BINDINGS</h3>
    <div id="key-settings"></div>
    <button class="btn" onclick="toggleSettings(false)">SAVE & CLOSE</button>
</div>

<div id="game-overlay">
    <button class="exit-btn" onclick="exitGame()">EXIT (X)</button>
    
    <div class="highway">
        <div class="lane" id="l0"><div class="key-label" id="k0">Q</div></div>
        <div class="lane" style="left:20%" id="l1"><div class="key-label" id="k1">W</div></div>
        <div class="lane" style="left:40%" id="l2"><div class="key-label" id="k2">E</div></div>
        <div class="lane" style="left:60%" id="l3"><div class="key-label" id="k3">R</div></div>
        <div class="lane" style="left:80%" id="l4"><div class="key-label" id="k4">T</div></div>
        <div class="hit-line"></div>
    </div>

    <div class="hud-container">
        <div id="score-display">000000</div>
        <div style="font-size: 12px; opacity: 0.5;">SCORE</div>
        <div id="combo-display">0</div>
        <div style="font-size: 12px; opacity: 0.5;">COMBO</div>
    </div>

    <div id="rating-text">PERFECT</div>
</div>

<script>
    let config = JSON.parse(localStorage.getItem('rhythmConfig')) || { keys: ['q', 'w', 'e', 'r', 't'] };
    let score = 0, combo = 0, isPlaying = false, activeNotes = [];

    // --- SETTINGS ---
    function toggleSettings(show) {
        document.getElementById('settings-modal').style.display = show ? 'block' : 'none';
        if(show) {
            const container = document.getElementById('key-settings');
            container.innerHTML = config.keys.map((k, i) => `
                <div class="key-row">Lane ${i+1}: <input class="key-input" maxlength="1" value="${k}" onchange="updateKey(${i}, this.value)"></div>
            `).join('');
        }
    }
    function updateKey(i, val) { config.keys[i] = val.toLowerCase(); localStorage.setItem('rhythmConfig', JSON.stringify(config)); updateLabels(); }
    function updateLabels() { config.keys.forEach((k, i) => document.getElementById('k'+i).innerText = k.toUpperCase()); }

    // --- GAME LOGIC ---
    function startGame() {
        isPlaying = true; score = 0; combo = 0; activeNotes = [];
        document.getElementById('event-page').style.filter = 'blur(10px)';
        document.getElementById('game-overlay').style.display = 'block';
        updateLabels();
        gameLoop();
        window.spawnClock = setInterval(spawnNote, 600);
    }

    function exitGame() {
        isPlaying = false;
        clearInterval(window.spawnClock);
        activeNotes.forEach(n => n.el.remove());
        document.getElementById('event-page').style.filter = 'none';
        document.getElementById('game-overlay').style.display = 'none';
    }

    function spawnNote() {
        if(!isPlaying) return;
        const laneIdx = Math.floor(Math.random() * 5);
        const laneEl = document.getElementById('l' + laneIdx);
        const el = document.createElement('div');
        el.className = 'note';
        el.style.top = '-50px';
        laneEl.appendChild(el);
        activeNotes.push({ el, y: -50, lane: laneIdx, hit: false });
    }

    function gameLoop() {
        if(!isPlaying) return;
        for(let i = activeNotes.length-1; i >= 0; i--) {
            let n = activeNotes[i];
            n.y += 8;
            n.el.style.top = n.y + 'px';

            if(n.y > window.innerHeight) {
                if(!n.hit) doMiss();
                n.el.remove();
                activeNotes.splice(i, 1);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    function doMiss() {
        combo = 0;
        score = Math.max(0, score - 50);
        showRating("MISSED", "#ff004c");
        updateHUD();
    }

    function showRating(txt, col) {
        const r = document.getElementById('rating-text');
        r.innerText = txt; r.style.color = col; r.style.opacity = 1;
        setTimeout(() => r.style.opacity = 0, 400);
    }

    function updateHUD() {
        document.getElementById('score-display').innerText = score.toString().padStart(6, '0');
        document.getElementById('combo-display').innerText = combo;
    }

    window.addEventListener('keydown', e => {
        if(!isPlaying) return;
        const laneIdx = config.keys.indexOf(e.key.toLowerCase());
        if(laneIdx === -1) return;

        const hitZone = window.innerHeight - 100;
        const note = activeNotes.find(n => n.lane === laneIdx && !n.hit && n.y > hitZone - 100);

        if(note) {
            const accuracy = Math.abs(note.y - hitZone);
            note.hit = true;
            note.el.style.display = 'none';
            if(accuracy < 25) { showRating("PERFECT", "#00fff2"); score += 150; combo++; }
            else { showRating("GOOD", "#ffea00"); score += 100; combo++; }
            updateHUD();
        }
    });

    updateLabels();
</script>
</body>
</html>
