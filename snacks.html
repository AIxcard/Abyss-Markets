<!DOCTYPE html>
<html>

<head>

<title>Aetherfall Snacks</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1026,#1c1040,#2a1a66);
color:white;
}

.title{
text-align:center;
font-size:50px;
margin-top:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
width:80%;
margin:60px auto;
}

.product{
background:#0e1535;
border-radius:18px;
padding:30px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

.product img{
width:100px;
height:100px;
border-radius:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1 class="title">Snacks</h1>

<div class="grid">

<div class="product">
<img src="chips.png">
<h3>Spicy Chips</h3>
<p>Price: $2</p>
<p>Stock: 10</p>
</div>

<div class="product">
<img src="chocolate.png">
<h3>Chocolate Bar</h3>
<p>Price: $1.50</p>
<p>Stock: 6</p>
</div>

</div>

<script src="cursor.js"></script>

</body>
</html>
