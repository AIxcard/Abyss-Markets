<!DOCTYPE html>
<html>
<head>

<title>Aetherfall Click Game</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#070b1f;
font-family:Arial;
color:white;
overflow:hidden;
}

header{
text-align:center;
font-size:40px;
padding:15px;
font-family:'Orbitron';
background:linear-gradient(90deg,#38bdf8,#9333ea);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#stats{
display:flex;
justify-content:center;
gap:25px;
}

.stat{
background:#0f172a;
padding:10px 18px;
border-radius:10px;
border:1px solid #1e3a8a;
}

#center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#sword{
width:260px;
transition:.15s;
}

#sword:hover{
transform:scale(1.05);
filter:drop-shadow(0 0 20px #9333ea);
}

.panel{
position:absolute;
left:20px;
top:150px;
width:260px;
}

.card{
background:#0f172a;
border:1px solid #1e3a8a;
border-radius:12px;
padding:14px;
margin-bottom:14px;
}

.bar{
height:16px;
background:#1e293b;
border-radius:6px;
position:relative;
overflow:hidden;
}

.fill{
background:#22c55e;
height:100%;
width:0%;
}

.percent{
position:absolute;
width:100%;
text-align:center;
top:0;
font-size:12px;
}

.shop{
position:absolute;
right:20px;
top:150px;
width:260px;
}

button{
background:#9333ea;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
margin-top:6px;
}

button:hover{
background:#a855f7;
}

.float{
position:absolute;
pointer-events:none;
font-weight:bold;
animation:floatUp 1s forwards;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-60px)}
}

</style>

</head>

<body>

<header>AETHERFALL CLICK GAME</header>

<div id="stats">

<div class="stat">Clicks: <span id="clicks">0</span></div>
<div class="stat">Coins: <span id="coins">0</span></div>
<div class="stat">Fragments: <span id="fragments">0</span></div>
<div class="stat">Combo: <span id="combo">0</span></div>

</div>

<div id="center">
<img src="Final_game_icon.png" id="sword">
</div>

<div class="panel">

<div class="card">

<b id="storyTitle">★ Storyline 1</b>

<div id="storyInfo"></div>

<div class="bar">
<div class="fill" id="storyFill"></div>
<div class="percent" id="storyPercent">0%</div>
</div>

<button id="claimBtn" onclick="claimStory()" disabled>
Claim Reward
</button>

</div>

</div>

<div class="shop">

<div class="card">

<b>5 Baht Coupon</b><br>
Cost: 300 Coins

<button onclick="buyCoupon(300,5)">Buy</button>

</div>

<div class="card">

<b>10 Baht Coupon</b><br>
Cost: 700 Coins

<button onclick="buyCoupon(700,10)">Buy</button>

</div>

<div class="card">

<b>20 Baht Coupon</b><br>
Cost: 1800 Coins

<button onclick="buyCoupon(1800,20)">Buy</button>

</div>

</div>

<audio id="music" loop>
<source src="placeholder.mp3">
</audio>

<script>

let clicks=0
let coins=0
let fragments=0
let combo=0
let lastClick=0

let storyIndex=0

const stories=[
{goal:100,reward:10},
{goal:500,reward:25},
{goal:2000,reward:80},
{goal:8000,reward:200}
]

const sword=document.getElementById("sword")

sword.onclick=e=>{

let now=Date.now()

if(now-lastClick>2000)combo=0
combo++

lastClick=now

clicks++

if(Math.random()<0.05)coins++
if(Math.random()<0.02)fragments++

spawnText(e)

update()

}

function spawnText(e){

let t=document.createElement("div")
t.className="float"

if(Math.random()<0.1){
t.innerText="CRITICAL"
t.style.color="#facc15"
coins+=2
}else{
t.innerText="+1"
t.style.color="#38bdf8"
}

t.style.left=e.pageX+"px"
t.style.top=e.pageY+"px"

document.body.appendChild(t)

setTimeout(()=>t.remove(),900)

}

function update(){

document.getElementById("clicks").innerText=clicks
document.getElementById("coins").innerText=coins
document.getElementById("fragments").innerText=fragments
document.getElementById("combo").innerText=combo

let s=stories[storyIndex]

document.getElementById("storyTitle").innerText=
"★ Storyline "+(storyIndex+1)

document.getElementById("storyInfo").innerText=
"Goal: "+s.goal+" clicks | Reward: "+s.reward+" coins"

let percent=Math.min(100,(clicks/s.goal)*100)

document.getElementById("storyFill").style.width=percent+"%"
document.getElementById("storyPercent").innerText=Math.floor(percent)+"%"

if(clicks>=s.goal){
document.getElementById("claimBtn").disabled=false
}

save()

}

function claimStory(){

let s=stories[storyIndex]

if(clicks<s.goal)return

coins+=s.reward

storyIndex++

document.getElementById("claimBtn").disabled=true

update()

}

function buyCoupon(cost,val){

if(coins<cost)return

coins-=cost

let code="AETHER-"+Math.floor(Math.random()*9000)

let coupons=JSON.parse(localStorage.getItem("abyssCoupons")||"[]")

coupons.push(code+" ("+val+" Baht)")

localStorage.setItem("abyssCoupons",JSON.stringify(coupons))

alert("Coupon: "+code)

}

function save(){

localStorage.setItem("af_clicks",clicks)
localStorage.setItem("af_coins",coins)
localStorage.setItem("af_frag",fragments)
localStorage.setItem("af_story",storyIndex)

}

function load(){

clicks=parseInt(localStorage.getItem("af_clicks"))||0
coins=parseInt(localStorage.getItem("af_coins"))||0
fragments=parseInt(localStorage.getItem("af_frag"))||0
storyIndex=parseInt(localStorage.getItem("af_story"))||0

update()

}

load()

</script>

</body>
</html>
