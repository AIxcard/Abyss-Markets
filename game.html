<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aetherfall | The Abyssal Market</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(15, 23, 42, 0.8);
            --border: #1e293b;
            --accent: #8b5cf6;
            --accent-glow: #6d28d9;
            --gold: #f59e0b;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
        }

        header {
            text-align: center;
            font-size: 48px;
            padding: 20px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 20%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.4));
        }

        /* NEW SPLIT BAR UI */
        #levelWrap {
            width: 550px;
            margin: 0 auto 20px;
        }

        .bar-outer {
            height: 30px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4c1d95, var(--accent));
            width: 0%;
            transition: width 0.4s ease-out;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .bar-content {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        .bar-separator {
            color: rgba(255,255,255,0.3);
            font-weight: normal;
        }

        /* STATS BOXES */
        #stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 110px;
            border-bottom: 3px solid var(--accent);
        }

        .stat-val {
            display: block;
            font-size: 1.2em;
            color: var(--gold);
            font-weight: bold;
        }

        /* LAYOUT */
        #main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            height: calc(100vh - 240px);
            padding: 0 30px;
            gap: 25px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        #sword-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #sword {
            width: 340px;
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.1));
            transition: transform 0.05s;
        }

        #sword:active { transform: scale(0.95); }

        /* UPGRADE ITEMS */
        .item {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: 0.2s;
        }

        .item:hover { border-color: var(--accent); }

        button {
            background: linear-gradient(to bottom, var(--accent), #6d28d9);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 5px;
        }

        button:hover { filter: brightness(1.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* FLOATING TEXT */
        .float {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            animation: floatMove 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatMove {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-80px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #020617;
            border: 2px solid var(--accent);
            width: 700px;
            padding: 30px;
            border-radius: 20px;
            z-index: 500;
        }
    </style>
</head>
<body>

    <header>AETHERFALL</header>

    <div id="levelWrap">
        <div class="bar-outer">
            <div id="levelFill" class="bar-fill"></div>
            <div class="bar-content">
                <span id="lvText">Level 1</span>
                <span class="bar-separator">|</span>
                <span id="expText">0 / 200 EXP</span>
            </div>
        </div>
    </div>

    <div id="stats">
        <div class="stat-card">Clicks<span id="clicks" class="stat-val">0</span></div>
        <div class="stat-card">Coins<span id="coins" class="stat-val">0</span></div>
        <div class="stat-card">Fragments<span id="frags" class="stat-val">0</span></div>
        <div class="stat-card">Combo<span id="combo" class="stat-val">0</span></div>
    </div>

    <div id="main-grid">
        <div class="panel">
            <h3>Nexus Menu</h3>
            <button style="width:100%" onclick="openModal('lore-modal')">📘 Ancient Lore</button>
            <button style="width:100%; margin-top:10px;" onclick="openModal('shop-modal')">🛒 Abyssal Shop</button>
            
            <h4 style="margin-top:20px; color: var(--accent);">Active Buffs</h4>
            <div id="buff-list" style="font-size: 0.8em; color: #94a3b8;">No active artifacts.</div>
        </div>

        <div id="sword-container">
            <img id="sword" src="Final_game_icon.png" alt="Sword">
        </div>

        <div class="panel">
            <h3>Missions</h3>
            <div class="item">
                <small>Storyline</small>
                <div id="storyGoalText" style="font-size: 0.85em; margin: 5px 0;">Loading...</div>
                <button id="storyClaimBtn" onclick="claimStory()">Claim Reward</button>
            </div>

            <div class="item">
                <small>Daily Bounty</small>
                <div style="font-size: 0.85em;">Goal: 2k Clicks</div>
                <button id="dailyClaimBtn" onclick="claimDaily()">Claim Daily</button>
            </div>
        </div>
    </div>

    <div id="lore-modal" class="modal">
        <h2 style="color: var(--accent);">The Chronicles</h2>
        <p id="lore-body" style="font-style: italic; line-height: 1.6; color: #cbd5e1;"></p>
        <button onclick="moveLore(-1)">Prev</button>
        <button onclick="moveLore(1)">Next</button>
        <button onclick="closeModal('lore-modal')" style="background: #334155; float: right;">Close</button>
    </div>

    <div id="shop-modal" class="modal">
        <h2>Abyssal Artifacts</h2>
        <div id="shop-items">
            </div>
        <button onclick="closeModal('shop-modal')" style="background: #334155; width: 100%; margin-top: 15px;">Close</button>
    </div>

    <script>
        /* GAME STATE */
        let clicks=0, coins=0, fragments=0, combo=0, power=1;
        let level=1, exp=0;
        let storyStage=0, fragmentBoost=1, autoclicker=false;
        let lastClick=Date.now();
        let lastDaily=0;
        let dailyClicks=0;

        const LORE = [
            "The Aether fell not as a gift, but as a shattered mirror of a dead world.",
            "Old scholars claimed the fragments are frozen time, harvested from the Rift.",
            "The sword you hold was forged in the Abyssal Market's deepest forge.",
            "To reach Level 100 is to become a being of pure Aether. Few survive the transition."
        ];
        let loreIdx = 0;

        /* BALANCED EXP SYSTEM */
        // Starts at 200, caps exactly at 50,000 for lvl 99->100
        function getExpRequired(lvl) {
            if (lvl >= 100) return 50000;
            let growth = Math.floor(200 + (Math.pow(lvl, 2.5) * 1.5));
            return Math.min(growth, 50000);
        }

        /* CLICK LOGIC */
        const sword = document.getElementById('sword');
        sword.onclick = (e) => {
            let now = Date.now();
            if (now - lastClick > 3000) combo = 0; // 3s Reset
            lastClick = now;

            let comboBonus = Math.floor(combo / 25);
            let totalGain = power + comboBonus;
            
            clicks += totalGain;
            dailyClicks += totalGain;
            combo++;

            // EXP GAIN: Very small to make the 50k cap feel like a huge challenge
            // Formula: 0.05 XP base, scales slightly with combo
            let xpGain = 0.05 + (combo * 0.002);
            gainExp(xpGain);

            // Fragment RNG
            if (Math.random() < (0.02 * fragmentBoost)) {
                fragments++;
                spawnFloat(e, "+1 Frag", "#8b5cf6");
            }

            spawnFloat(e, "+" + totalGain, "#f59e0b");
            updateUI();
        };

        function gainExp(amt) {
            exp += amt;
            let req = getExpRequired(level);
            while (exp >= req && level < 100) {
                exp -= req;
                level++;
                req = getExpRequired(level);
            }
        }

        function spawnFloat(e, text, color) {
            const f = document.createElement('div');
            f.className = 'float';
            f.innerText = text;
            f.style.left = e.pageX + 'px';
            f.style.top = e.pageY + 'px';
            f.style.color = color;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);
        }

        /* MISSIONS */
        const storyGoals = [1000, 10000, 100000, 500000, 1000000];
        const storyPrizes = [200, 1500, 8000, 25000, 100000];

        function claimStory() {
            const btn = document.getElementById('storyClaimBtn');
            if(clicks >= storyGoals[storyStage]) {
                coins += storyPrizes[storyStage];
                storyStage++;
                btn.innerText = "Claimed!";
            } else {
                btn.innerText = "Not Ready";
            }
            setTimeout(() => { btn.innerText = "Claim Reward"; }, 1500);
        }

        /* UI UPDATE */
        function updateUI() {
            document.getElementById('clicks').innerText = Math.floor(clicks).toLocaleString();
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('frags').innerText = fragments;
            document.getElementById('combo').innerText = combo;

            // Split Bar Update
            let req = getExpRequired(level);
            document.getElementById('lvText').innerText = "Level " + level;
            document.getElementById('expText').innerText = Math.floor(exp).toLocaleString() + " / " + req.toLocaleString() + " EXP";
            document.getElementById('levelFill').style.width = (exp / req * 100) + "%";

            // Story Text
            if(storyStage < storyGoals.length) {
                document.getElementById('storyGoalText').innerText = `Goal: ${storyGoals[storyStage].toLocaleString()} Clicks (Prize: ${storyPrizes[storyStage]} Coins)`;
            } else {
                document.getElementById('storyGoalText').innerText = "All Story Missions Complete!";
            }
        }

        /* MODALS */
        function openModal(id) { 
            document.getElementById(id).style.display = 'block'; 
            if(id === 'lore-modal') moveLore(0);
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function moveLore(n) {
            loreIdx = (loreIdx + n + LORE.length) % LORE.length;
            document.getElementById('lore-body').innerText = LORE[loreIdx];
        }

        // Initialize
        setInterval(updateUI, 100);
        updateUI();

    </script>
</body>
</html>
